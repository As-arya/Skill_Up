services:
  - type: web
    name: skillup-backend
    runtime: node
    rootDir: .
    buildCommand: npm install && NODE_ENV=production npx prisma generate && npm run build
    startCommand: NODE_ENV=production npx tsx scripts/migrate-prod.ts && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
